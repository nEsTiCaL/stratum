# Lebendes Artefakt = die Docker-Ableitung (siehe architecture/dev-setup.md).
# Start: nur Postgres (pgvector-faehig). Spaeter additiv: Kern, Gateway.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: stratum-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stratum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stratum}
      POSTGRES_DB: ${POSTGRES_DB:-stratum}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stratum} -d ${POSTGRES_DB:-stratum}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: .
    container_name: stratum-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratum}:${POSTGRES_PASSWORD:-stratum}@db:5432/${POSTGRES_DB:-stratum}
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONUNBUFFERED: "1"
      # Schreibpfad (Schritt 7): Workspaces auf ein persistentes Volume, NICHT in
      # den Quellbaum (/app/.workspaces). Sonst wischt jeder `--build` (COPY . .
      # + Recreate) angewandte Patches weg. resolve_base liest STRATUM_WORKSPACES
      # vor dem Default. Muss unter dem Volume-Mount liegen.
      STRATUM_WORKSPACES: /data/workspaces
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - workspaces:/data/workspaces
    restart: unless-stopped

volumes:
  pgdata:
  workspaces:
